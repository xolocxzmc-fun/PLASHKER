name: Build Windows Installer

# Запускается автоматически при каждом git push в ветку main,
# а также вручную кнопкой "Run workflow" на вкладке Actions.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # Настоящая Windows x64 в облаке GitHub — бесплатно для публичных репозиториев.
    runs-on: windows-latest

    steps:
      - name: Забрать код из репозитория
        uses: actions/checkout@v4

      - name: Поставить Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Установить зависимости и PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Собрать Plashker.exe (PyInstaller)
        run: pyinstaller Plashker-windows.spec --noconfirm

      - name: Установить Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Собрать установщик (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Plashker-Installer.iss'

      - name: Выложить готовый установщик как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: Plashker-Setup
          path: Output/Plashker-Setup.exe
          if-no-files-found: error
